<!DOCTYPE html>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.5s ease;
        }
        .heading-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); color: #e2e8f0; }
        .day-mode { background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); color: #1e2937; }
        .comfort-mode { background: linear-gradient(135deg, #f1f5f9 0%, #fef3c7 100%); color: #334155; }
        .accent-text { color: #ef4444; }
    </style>
</head>
<body class="dark-mode min-h-screen">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full bg-slate-900/95 backdrop-blur-md border-b border-slate-700 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-red-500 rounded-2xl flex items-center justify-center text-white font-bold text-xl">LG</div>
                <span class="text-2xl font-bold heading-font">Lokendra Gaire</span>
            </div>
            
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="goHome()" class="hover:text-red-400 flex items-center gap-1">🏠 Home</a>
                <a href="About.html" class="hover:text-red-400">About</a>
                <a href="Portfolio.html" class="hover:text-red-400">Portfolio</a>
                <a href="gallery.html" class="hover:text-red-400">Gallery</a>
                <a href="social.html" class="hover:text-red-400">Social Media</a>
                <a href="ram.html" class="hover:text-red-400">Social engagement </a>
            </div>

            <div class="flex gap-2">
                <button onclick="setMode('dark')" class="px-4 py-2 rounded-2xl hover:bg-slate-800 text-xs">🌙 Dark</button>
                <button onclick="setMode('day')" class="px-4 py-2 rounded-2xl hover:bg-slate-800 text-xs">☀️ Day</button>
                <button onclick="setMode('comfort')" class="px-4 py-2 rounded-2xl hover:bg-slate-800 text-xs">👁️ Comfort</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="min-h-screen flex items-center relative">
        <div class="absolute inset-0 bg-[url('https://picsum.photos/id/1015/2000/1200')] opacity-10 bg-cover"></div>
        
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center relative z-10">
            <div class="space-y-8">
                <div class="text-red-500 tracking-widest text-sm">GALKOT-2, BAGLUNG, NEPAL</div>
                <h1 class="text-6xl md:text-7xl font-bold heading-font leading-none">
                    Hi, I'm <span class="accent-text">Lokendra Gaire</span>
                </h1>
                <p class="text-4xl">Digital Creator &amp; Tech Enthusiast</p>
                <p class="max-w-md text-lg">Passionate about technology, social media management, creative design and community development.</p>
                
                <div class="flex flex-wrap gap-4">
                    <a href="tel:+9779869065252" class="px-8 py-4 bg-red-500 hover:bg-red-600 text-white rounded-3xl font-semibold flex items-center gap-3">📞 Call Me</a>
                    <a href="https://wa.me/+9779869065252" class="px-8 py-4 border border-green-600 hover:bg-green-100 rounded-3xl font-semibold">💬 WhatsApp</a>
                    <a href="mailto:lokendra.gaire@gmail.com" class="px-8 py-4 border border-blue-600 hover:bg-blue-100 rounded-3xl font-semibold">✉️ Gmail</a>
                </div>
            </div>
            
            <div class="flex justify-center">
                <img src="brp.jpg" alt="Lokendra Gaire" class="rounded-3xl shadow-2xl border-4 border-slate-600 max-h-[520px] object-cover">
            </div>
        </div>
    </section>

    <script>
        function goHome() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setMode(mode) {
            const body = document.body;
            body.classList.remove('dark-mode', 'day-mode', 'comfort-mode');
            
            if (mode === 'day') body.classList.add('day-mode');
            else if (mode === 'comfort') body.classList.add('comfort-mode');
            else body.classList.add('dark-mode');
            
            localStorage.setItem('mode', mode);
        }

        // Load previous mode
        window.onload = function() {
            const saved = localStorage.getItem('mode') || 'dark';
            setMode(saved);
        };
    </script>
</body>
</html>
