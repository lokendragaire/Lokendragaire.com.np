<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Lokendra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --brand: #2563eb;
      --brand-hover: #1d4ed8;
      --brand-light: rgba(37, 99, 235, 0.08);
      --accent: #f59e0b;
      --shadow: 0 8px 30px rgba(0,0,0,0.04);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 12px;
      --transition: 0.25s cubic-bezier(0.2,0,0,1);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --border: #334155;
      --brand-light: rgba(37,99,235,0.2);
      --shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.25s, color 0.25s;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      background: rgba(var(--surface-rgb,255,255,255),0.8);
      transition: background 0.25s;
    }
    [data-theme="dark"] .navbar { background: rgba(30,41,59,0.85); }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--brand); display: flex; align-items: center; gap: 8px; }
    .nav-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 40px;
      background: var(--border);
      color: var(--text);
      text-decoration: none;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-hover); transform: scale(1.02); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); }
    .btn-outline:hover { background: var(--brand-light); border-color: var(--brand); }
    .btn-success { background: #10b981; color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mb-4 { margin-bottom: 16px; }
    .mt-4 { margin-top: 16px; }
    .text-center { text-align: center; }
    .text-gray { color: #94a3b8; }
    
    .dashboard-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      transition: all 0.25s;
    }
    .dashboard-card:hover { box-shadow: var(--shadow-hover); }
    
    .post-item {
      background: var(--bg);
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .post-item .post-info { flex: 1; min-width: 150px; }
    .post-item .post-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 14px;
      font-family: inherit;
      font-size: 1rem;
    }
    .form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
    
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--surface);
      border-radius: 24px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    }
    .auth-status { padding: 12px; border-radius: var(--radius); margin-top: 12px; display: none; }
    .auth-status.error { display: block; background: #fef2f2; color: #dc2626; }
    .auth-status.success { display: block; background: #f0fdf4; color: #16a34a; }
    
    .login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-overlay.active { display: flex; }
    .login-box {
      background: var(--surface);
      border-radius: 24px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 40px 80px rgba(0,0,0,0.3);
    }
    
    .footer { border-top: 1px solid var(--border); padding: 24px 0; margin-top: 40px; text-align: center; font-size: 0.85rem; color: #94a3b8; }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
    <div class="nav-actions">
      <button class="btn btn-outline" id="themeToggle"><i class="fas fa-moon"></i></button>
      <button class="btn btn-outline" id="goToBlog"><i class="fas fa-blog"></i> Blog</button>
      <button class="btn btn-outline" id="authBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container" style="padding-top: 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
      <h2><i class="fas fa-file-alt"></i> Manage Posts</h2>
      <button class="btn btn-primary" id="createBtn"><i class="fas fa-plus"></i> New Post</button>
    </div>
    
    <div id="postsContainer">
      <div class="dashboard-card">
        <p class="text-gray text-center">Loading posts...</p>
      </div>
    </div>
  </main>

  <!-- POST MODAL -->
  <div class="modal" id="postModal">
    <div class="modal-content">
      <h2 id="modalTitle" class="mb-4">Create Post</h2>
      <form id="postForm">
        <input type="hidden" id="postId" />
        <input type="text" id="postTitle" class="form-control" placeholder="Title" required />
        <input type="text" id="postCategory" class="form-control" placeholder="Category" />
        <textarea id="postContent" class="form-control" rows="5" placeholder="Content" required></textarea>
        <input type="url" id="postImage" class="form-control" placeholder="Image URL (optional)" />
        <div class="flex gap-2">
          <button type="submit" class="btn btn-success" id="saveBtn"><i class="fas fa-save"></i> Save</button>
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        </div>
        <div id="postStatus" class="auth-status"></div>
      </form>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div class="login-overlay" id="loginModal">
    <div class="login-box">
      <h2 class="mb-4"><i class="fas fa-lock"></i> Admin Login</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" class="form-control" placeholder="Email" required />
        <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Login</button>
          <button type="button" class="btn btn-outline" onclick="closeLogin()">Cancel</button>
        </div>
        <div id="loginStatus" class="auth-status"></div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer container">
    <p>&copy; 2026 Nabin Chalise · Dashboard</p>
  </footer>

  <script>
    // Supabase Config
    const SUPABASE_URL = 'https://yrvetxtjvkdvknnvngez.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let posts = [];

    const postsContainer = document.getElementById('postsContainer');
    const authBtn = document.getElementById('authBtn');
    const goToBlog = document.getElementById('goToBlog');
    const createBtn = document.getElementById('createBtn');
    const loginModal = document.getElementById('loginModal');
    const postModal = document.getElementById('postModal');

    // Theme
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const icon = document.querySelector('#themeToggle i');
      if (icon) icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Auth Check
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        currentUser = session.user;
        updateUI();
        fetchPosts();
      } else {
        // Show login modal
        loginModal.classList.add('active');
      }
    }

    function updateUI() {
      if (currentUser) {
        authBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> Logout`;
        authBtn.onclick = handleLogout;
        createBtn.style.display = 'inline-flex';
      } else {
        authBtn.innerHTML = `<i class="fas fa-lock"></i> Login`;
        authBtn.onclick = () => loginModal.classList.add('active');
        createBtn.style.display = 'none';
      }
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      updateUI();
      loginModal.classList.add('active');
      postsContainer.innerHTML = `<div class="dashboard-card"><p class="text-gray text-center">Please login to manage posts.</p></div>`;
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const status = document.getElementById('loginStatus');
      status.className = 'auth-status success';
      status.textContent = '⏳ Authenticating...';
      status.style.display = 'block';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        status.textContent = '✅ Login successful!';
        status.className = 'auth-status success';
        updateUI();
        closeLogin();
        fetchPosts();
      } catch (err) {
        status.textContent = '❌ ' + (err.message || 'Login failed');
        status.className = 'auth-status error';
      }
    });

    function closeLogin() { loginModal.classList.remove('active'); }
    window.closeLogin = closeLogin;

    // Go to Blog
    goToBlog.addEventListener('click', () => {
      window.location.href = 'blog.html';
    });

    // Fetch Posts
    async function fetchPosts() {
      postsContainer.innerHTML = `<div class="dashboard-card"><p class="text-gray text-center">Loading...</p></div>`;
      try {
        const { data, error } = await supabase
          .from('blog_posts')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        posts = data || [];
        renderPosts();
      } catch (err) {
        postsContainer.innerHTML = `<div class="dashboard-card"><p class="text-gray text-center">❌ ${err.message}</p></div>`;
      }
    }

    function renderPosts() {
      if (!posts.length) {
        postsContainer.innerHTML = `<div class="dashboard-card"><p class="text-gray text-center">📭 No posts yet. Create your first post!</p></div>`;
        return;
      }
      postsContainer.innerHTML = posts.map(post => `
        <div class="post-item">
          <div class="post-info">
            <strong>${escapeHtml(post.title)}</strong>
            <span class="category-badge" style="background:var(--brand-light);color:var(--brand);padding:2px 12px;border-radius:40px;font-size:0.7rem;font-weight:600;text-transform:uppercase;margin-left:8px;">${escapeHtml(post.category || 'General')}</span>
            <div style="font-size:0.8rem;color:#94a3b8;margin-top:4px;">
              ${new Date(post.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })}
            </div>
          </div>
          <div class="post-actions">
            <button class="btn btn-primary" onclick="editPost('${post.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-danger" onclick="deletePost('${post.id}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Create Post
    createBtn.addEventListener('click', () => {
      if (!currentUser) { loginModal.classList.add('active'); return; }
      document.getElementById('postId').value = '';
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = '';
      document.getElementById('postContent').value = '';
      document.getElementById('postImage').value = '';
      document.getElementById('modalTitle').textContent = 'Create New Post';
      document.getElementById('postStatus').style.display = 'none';
      postModal.classList.add('active');
    });

    // Edit Post
    async function editPost(id) {
      if (!currentUser) return;
      try {
        const { data, error } = await supabase.from('blog_posts').select('*').eq('id', id).single();
        if (error) throw error;
        document.getElementById('postId').value = data.id;
        document.getElementById('postTitle').value = data.title;
        document.getElementById('postCategory').value = data.category || '';
        document.getElementById('postContent').value = data.content;
        document.getElementById('postImage').value = data.image_url || '';
        document.getElementById('modalTitle').textContent = 'Edit Post';
        document.getElementById('postStatus').style.display = 'none';
        postModal.classList.add('active');
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }
    window.editPost = editPost;

    // Delete Post
    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      try {
        await supabase.from('blog_posts').delete().eq('id', id);
        fetchPosts();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }
    window.deletePost = deletePost;

    // Close Modal
    function closeModal() { postModal.classList.remove('active'); }
    window.closeModal = closeModal;

    // Save Post
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('postId').value;
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const category = document.getElementById('postCategory').value.trim();
      const image_url = document.getElementById('postImage').value.trim();
      const status = document.getElementById('postStatus');

      if (!title || !content) {
        status.textContent = '❌ Title & content required';
        status.className = 'auth-status error';
        status.style.display = 'block';
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        if (id) {
          await supabase.from('blog_posts').update({
            title, content, category: category || 'General',
            image_url: image_url || null,
            updated_at: new Date().toISOString()
          }).eq('id', id);
          status.textContent = '✅ Updated successfully!';
          status.className = 'auth-status success';
        } else {
          await supabase.from('blog_posts').insert([{
            title, content, category: category || 'General',
            image_url: image_url || null,
            author: currentUser?.email || 'Admin'
          }]);
          status.textContent = '✅ Created successfully!';
          status.className = 'auth-status success';
        }
        status.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 3000);
        closeModal();
        fetchPosts();
      } catch (err) {
        status.textContent = '❌ ' + err.message;
        status.className = 'auth-status error';
        status.style.display = 'block';
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save';
      }
    });

    // Init
    checkAuth();
  </script>
</body>
</html>
