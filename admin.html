<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Labour Permit System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a7a3a;
            --sidebar-width: 260px;
        }
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #0d2b5e, #1a4a8a);
            padding: 20px 0;
            color: white;
            overflow-y: auto;
            z-index: 1050;
            transition: all 0.3s;
        }
        .sidebar .brand {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar .brand h4 {
            font-weight: 700;
            margin: 0;
        }
        .sidebar .brand small {
            opacity: 0.7;
            font-size: 0.75rem;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            border-radius: 10px;
            margin: 3px 12px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .sidebar .nav-link i {
            width: 24px;
            text-align: center;
            margin-right: 10px;
        }
        .sidebar .nav-link .badge {
            margin-left: auto;
            background: #c62828;
        }

        /* ===== MAIN ===== */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 25px 30px;
        }

        /* ===== STATS ===== */
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.10);
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
        }
        .stat-card .label {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* ===== TABLE ===== */
        .table-custom {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .table-custom thead {
            background: #f8f9fc;
        }
        .table-custom th {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #555;
            border-bottom: 2px solid #e9ecef;
        }
        .table-custom td {
            vertical-align: middle;
            font-size: 0.9rem;
            padding: 12px 15px;
        }

        .status-badge {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .status-badge.active { background: #e8f5e9; color: #1a7a3a; }
        .status-badge.pending { background: #fff3e0; color: #e65100; }
        .status-badge.completed { background: #e3f2fd; color: #0d47a1; }

        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 2px;
        }
        .btn-action:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.08);
        }
        .btn-action.delete:hover { background: #c62828; }

        /* ===== FORM ===== */
        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(26,122,58,0.12);
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }

        /* Loading Spinner */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- ===== LOADING SPINNER ===== -->
    <div class="spinner-overlay" id="spinner">
        <div class="spinner-border text-success" style="width: 50px; height: 50px;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <h4><i class="fas fa-leaf me-2"></i> FEMS</h4>
            <small>Foreign Employment Management</small>
            <div class="mt-2 text-success" style="font-size:0.7rem;">
                <i class="fas fa-circle me-1" style="font-size:6px;"></i> Admin: <span id="adminName">Admin</span>
            </div>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link active" data-page="dashboard">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            <a class="nav-link" data-page="workers">
                <i class="fas fa-users"></i> श्रमिक सूची
                <span class="badge" id="workerBadge">0</span>
            </a>
            <a class="nav-link" data-page="add-worker">
                <i class="fas fa-user-plus"></i> नयाँ दर्ता
            </a>
            <a class="nav-link" data-page="reports">
                <i class="fas fa-file-alt"></i> प्रतिवेदन
            </a>
            <a class="nav-link" style="margin-top:20px; color:rgba(255,255,255,0.5);" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> लगआउट
            </a>
        </nav>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainContent">

        <!-- Top Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <button class="btn btn-light d-md-none me-2" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h4 class="d-inline" id="pageTitle">Dashboard</h4>
            </div>
            <div>
                <span class="badge bg-success me-2">
                    <i class="fas fa-circle me-1" style="font-size:6px;"></i> Online
                </span>
                <a href="saram.html" class="btn btn-outline-primary btn-sm" target="_blank">
                    <i class="fas fa-eye me-1"></i> Public View
                </a>
            </div>
        </div>

        <!-- ===== DASHBOARD ===== -->
        <div id="section-dashboard">
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-md-3 col-6">
                    <div class="stat-card">
                        <div class="number" id="statTotal">0</div>
                        <div class="label">कुल श्रमिक</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card" style="border-left-color:#0d47a1;">
                        <div class="number" id="statActive">0</div>
                        <div class="label">सक्रिय</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card" style="border-left-color:#e65100;">
                        <div class="number" id="statPending">0</div>
                        <div class="label">पेन्डिङ</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-card" style="border-left-color:#c62828;">
                        <div class="number" id="statExpiring">0</div>
                        <div class="label">म्याद सकिने</div>
                    </div>
                </div>
            </div>

            <div class="table-custom p-3">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h6 class="m-0"><i class="fas fa-list me-2"></i> हालैका श्रमिक</h6>
                    <div>
                        <input type="text" class="form-control form-control-sm" style="width:200px; display:inline-block;" placeholder="खोज्नुहो
