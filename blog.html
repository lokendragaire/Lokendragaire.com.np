<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog · Admin</title>
    <!-- Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 1100px;
            width: 100%;
        }
        /* header */
        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: white;
            padding: 1.2rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            margin-bottom: 2rem;
        }
        .blog-header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            color: #0b1e33;
            letter-spacing: -0.5px;
        }
        .blog-header h1 i {
            color: #3b82f6;
            margin-right: 8px;
        }
        .auth-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .auth-btn:hover {
            background: #0f172a;
            transform: scale(1.02);
        }
        .auth-btn i {
            font-size: 1rem;
        }
        .auth-btn.logout {
            background: #dc2626;
        }
        .auth-btn.logout:hover {
            background: #b91c1c;
        }

        /* cards */
        .card {
            background: white;
            border-radius: 1.8rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.04);
            margin-bottom: 2rem;
            transition: 0.15s;
            border: 1px solid #f0f4fa;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0b1e33;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i {
            color: #3b82f6;
        }

        /* login panel */
        .login-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .login-panel .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .login-panel input {
            flex: 1 1 180px;
            padding: 0.7rem 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
        }
        .login-panel input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .login-panel .btn-primary {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .login-panel .btn-primary:hover {
            background: #2563eb;
        }
        .login-status {
            font-size: 0.9rem;
            color: #475569;
        }
        .login-status.success {
            color: #16a34a;
        }
        .login-status.error {
            color: #dc2626;
        }

        /* post form (visible only when logged in) */
        .post-form {
            display: none;
            flex-direction: column;
            gap: 1.2rem;
        }
        .post-form.visible {
            display: flex;
        }
        .post-form input, 
        .post-form textarea {
            padding: 0.8rem 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
            width: 100%;
        }
        .post-form textarea {
            border-radius: 24px;
            resize: vertical;
            min-height: 120px;
        }
        .post-form input:focus, 
        .post-form textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .post-form .btn-success {
            background: #0f172a;
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            align-self: flex-start;
            font-size: 0.95rem;
        }
        .post-form .btn-success:hover {
            background: #1e293b;
        }

        /* posts list */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .post-item {
            background: #fafcff;
            padding: 1.2rem 1.6rem;
            border-radius: 1.6rem;
            border-left: 5px solid #3b82f6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: 0.1s;
        }
        .post-item h3 {
            font-weight: 600;
            font-size: 1.2rem;
            color: #0b1e33;
            margin-bottom: 4px;
        }
        .post-item .post-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 0.4rem;
            border-top: 1px solid #eef2f6;
            padding-top: 0.6rem;
        }
        .post-item .post-meta span i {
            margin-right: 4px;
            color: #3b82f6;
        }
        .post-item .post-content {
            color: #1e293b;
            margin-top: 0.3rem;
            line-height: 1.5;
            word-break: break-word;
        }
        .empty-posts {
            color: #64748b;
            font-style: italic;
            padding: 0.8rem 0;
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0 6px;
            transition: 0.1s;
        }
        .delete-btn:hover {
            color: #dc2626;
        }

        /* utility */
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .gap-2 { gap: 0.8rem; }
        .mt-2 { margin-top: 0.6rem; }
        .hidden { display: none; }
        .text-center { text-align: center; }

        @media (max-width: 600px) {
            .blog-header { flex-direction: column; align-items: start; gap: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <header class="blog-header">
        <h1><i class="fas fa-pen-fancy"></i> My Blog</h1>
        <div>
            <button id="authToggleBtn" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Admin login</button>
        </div>
    </header>

    <!-- Login Panel (always visible) -->
    <div class="card" id="loginCard">
        <div class="card-title"><i class="fas fa-lock"></i> Admin access</div>
        <div class="login-panel">
            <div class="input-group">
                <input type="text" id="loginEmail" placeholder="Email" value="admin@blog.com" />
                <input type="password" id="loginPassword" placeholder="Password" value="12345678" />
                <button id="loginBtn" class="btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
                <button id="logoutBtn" class="btn-primary" style="background:#64748b; display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div id="loginStatus" class="login-status">🔐 Use demo credentials or sign up</div>
        </div>
    </div>

    <!-- Create Post (visible when logged in) -->
    <div class="card" id="postCard">
        <div class="card-title"><i class="fas fa-pencil"></i> Write new post</div>
        <div id="postFormWrapper" class="post-form">
            <input type="text" id="postTitle" placeholder="Post title" />
            <textarea id="postContent" placeholder="Write your blog content here..."></textarea>
            <button id="publishBtn" class="btn-success"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
            <div id="publishStatus" style="font-size:0.9rem; color:#475569;"></div>
        </div>
        <div id="loginRequiredMsg" style="color:#94a3b8; padding:0.2rem 0; font-size:0.95rem;">
            <i class="fas fa-info-circle"></i> Log in to create posts.
        </div>
    </div>

    <!-- Posts list -->
    <div class="card">
        <div class="card-title"><i class="fas fa-list-ul"></i> All posts</div>
        <div id="postsContainer" class="posts-grid">
            <div class="empty-posts">Loading posts...</div>
        </div>
    </div>

</div>

<script>
    (function() {
        // ---------- SUPABASE CONFIG ----------
        const SUPABASE_URL = 'https://yrvetxtjvkdvknnvngez.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- DOM REFS ----------
        const authToggleBtn = document.getElementById('authToggleBtn');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginStatus = document.getElementById('loginStatus');

        const postFormWrapper = document.getElementById('postFormWrapper');
        const loginRequiredMsg = document.getElementById('loginRequiredMsg');
        const postTitle = document.getElementById('postTitle');
        const postContent = document.getElementById('postContent');
        const publishBtn = document.getElementById('publishBtn');
        const publishStatus = document.getElementById('publishStatus');

        const postsContainer = document.getElementById('postsContainer');

        // ---------- STATE ----------
        let currentUser = null;          // will store user object if logged in
        let sessionToken = null;         // not strictly needed, but we keep

        // ---------- HELPER: fetch posts from Supabase ----------
        async function fetchPosts() {
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderPosts(data || []);
            } catch (err) {
                console.error('Fetch posts error:', err);
                postsContainer.innerHTML = `<div class="empty-posts">⚠️ Could not load posts. ${err.message}</div>`;
            }
        }

        // ---------- RENDER POSTS ----------
        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                postsContainer.innerHTML = `<div class="empty-posts"><i class="fas fa-newspaper"></i> No blog posts yet.</div>`;
                return;
            }

            let html = '';
            posts.forEach(post => {
                const created = post.created_at ? new Date(post.created_at).toLocaleDateString('en-US', { 
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                }) : 'unknown date';
                html += `
                    <div class="post-item" data-id="${post.id}">
                        <h3>${escapeHtml(post.title) || 'Untitled'}</h3>
                        <div class="post-content">${escapeHtml(post.content) || ''}</div>
                        <div class="post-meta">
                            <span><i class="far fa-calendar-alt"></i> ${created}</span>
                            <span>
                                <i class="far fa-user"></i> ${escapeHtml(post.author_email) || 'admin'}
                                ${currentUser ? `<button class="delete-btn" data-id="${post.id}" title="Delete post"><i class="fas fa-trash-can"></i></button>` : ''}
                            </span>
                        </div>
                    </div>
                `;
            });
            postsContainer.innerHTML = html;

            // Attach delete events if logged in
            if (currentUser) {
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const postId = btn.dataset.id;
                        if (!postId) return;
                        if (!confirm('Delete this post?')) return;
                        try {
                            const { error } = await supabase
                                .from('posts')
                                .delete()
                                .eq('id', postId);
                            if (error) throw error;
                            fetchPosts(); // refresh
                            publishStatus.innerText = '🗑️ Post deleted.';
                            setTimeout(() => publishStatus.innerText = '', 2500);
                        } catch (err) {
                            alert('Delete failed: ' + err.message);
                        }
                    });
                });
            }
        }

        // simple escape
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // ---------- UI UPDATE (login/logout) ----------
        function updateUIForUser(user) {
            currentUser = user;
            if (user) {
                // logged in
                loginStatus.className = 'login-status success';
                loginStatus.innerHTML = `✅ Logged in as <strong>${user.email}</strong>`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-flex';
                authToggleBtn.innerHTML = `<i class="fas fa-user-cog"></i> ${user.email}`;
                authToggleBtn.className = 'auth-btn';

                postFormWrapper.classList.add('visible');
                loginRequiredMsg.style.display = 'none';
                // show delete buttons via re-render
                fetchPosts();
            } else {
                // logged out
                loginStatus.className = 'login-status';
                loginStatus.innerHTML = '🔐 Logged out. Use demo credentials.';
                loginBtn.style.display = 'inline-flex';
                logoutBtn.style.display = 'none';
                authToggleBtn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Admin login`;
                authToggleBtn.className = 'auth-btn';

                postFormWrapper.classList.remove('visible');
                loginRequiredMsg.style.display = 'block';
                // re-render posts without delete buttons
                fetchPosts();
            }
        }

        // ---------- LOGIN ----------
        async function handleLogin() {
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            if (!email || !password) {
                loginStatus.className = 'login-status error';
                loginStatus.innerText = '❌ Email and password required.';
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;
                if (data?.user) {
                    sessionToken = data.session?.access_token;
                    updateUIForUser(data.user);
                    loginStatus.className = 'login-status success';
                    loginStatus.innerText = `✅ Welcome ${data.user.email}`;
                } else {
                    throw new Error('No user data returned');
                }
            } catch (err) {
                console.error('Login error:', err);
                loginStatus.className = 'login-status error';
                loginStatus.innerText = `❌ Login failed: ${err.message}`;
                // if error due to user not found, try signup? but we keep it simple: show message.
                if (err.message.includes('Invalid login credentials')) {
                    loginStatus.innerText = '❌ Invalid credentials. Try: admin@blog.com / 12345678';
                }
            }
        }

        // ---------- LOGOUT ----------
        async function handleLogout() {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                currentUser = null;
                sessionToken = null;
                updateUIForUser(null);
                loginStatus.className = 'login-status';
                loginStatus.innerText = '🔐 Logged out successfully.';
                // clear possible sensitive fields
                loginPassword.value = '';
            } catch (err) {
                console.error('Logout error:', err);
                loginStatus.className = 'login-status error';
                loginStatus.innerText = `❌ Logout error: ${err.message}`;
            }
        }

        // ---------- PUBLISH POST ----------
        async function handlePublish() {
            if (!currentUser) {
                publishStatus.innerText = '⚠️ You must be logged in.';
                return;
            }
            const title = postTitle.value.trim() || 'Untitled';
            const content = postContent.value.trim();
            if (!content) {
                publishStatus.innerText = '⚠️ Please write some content.';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('posts')
                    .insert([
                        { 
                            title: title,
                            content: content,
                            author_email: currentUser.email,
                        }
                    ])
                    .select();

                if (error) throw error;

                publishStatus.innerText = '✅ Post published!';
                postTitle.value = '';
                postContent.value = '';
                fetchPosts(); // refresh list
                setTimeout(() => { publishStatus.innerText = ''; }, 3000);
            } catch (err) {
                console.error('Publish error:', err);
                publishStatus.innerText = `❌ Error: ${err.message}`;
            }
        }

        // ---------- CHECK SESSION ON LOAD ----------
        async function checkSession() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;
                if (session?.user) {
                    currentUser = session.user;
                    sessionToken = session.access_token;
                    updateUIForUser(currentUser);
                    loginStatus.className = 'login-status success';
                    loginStatus.innerText = `✅ Logged in as ${currentUser.email}`;
                } else {
                    updateUIForUser(null);
                }
            } catch (err) {
                console.warn('Session check:', err);
                updateUIForUser(null);
            }
            // fetch posts anyway
            fetchPosts();
        }

        // ---------- EVENT LISTENERS ----------
        loginBtn.addEventListener('click', handleLogin);
        logoutBtn.addEventListener('click', handleLogout);
        publishBtn.addEventListener('click', handlePublish);

        // press enter on password field triggers login
        loginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        loginEmail.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // auth toggle button: if logged out, focus login; if logged in, show logout? we just use it to scroll or logout 
        authToggleBtn.addEventListener('click', () => {
            if (currentUser) {
                // if logged in, clicking header button logs out? better ask
                if (confirm('Logout?')) {
                    handleLogout();
                }
            } else {
                document.getElementById('loginCard').scrollIntoView({ behavior: 'smooth' });
                loginEmail.focus();
            }
        });

        // init
        checkSession();

        // optional: for demo, prefill demo credentials
        // (already prefilled in html)
    })();
</script>

<!-- SQL TABLE schema (for reference, not executed) 
     You need to create a 'posts' table in Supabase with:
     id: uuid primary key default gen_random_uuid()
     title: text
     content: text
     author_email: text
     created_at: timestamptz default now()
-->
<!-- 
  SQL to create the table (run in Supabase SQL editor):
  CREATE TABLE posts (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    title TEXT,
    content TEXT,
    author_email TEXT,
    created_at TIMESTAMPTZ DEFAULT now()
  );
  ALTER TABLE posts ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "Enable all for authenticated users" ON posts
    FOR ALL USING (true) WITH CHECK (true);
  -- (or set up your own RLS policies)
-->
</body>
</html>
