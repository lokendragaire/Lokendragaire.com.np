<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ Personal Blog · Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 1.5rem 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .header h1 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(79, 172, 254, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .card-title i {
            color: #667eea;
            font-size: 1.8rem;
        }

        /* Login Form */
        .login-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .login-form input {
            flex: 1;
            min-width: 200px;
            padding: 0.9rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .login-status {
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
        }

        .login-status.success {
            color: #48bb78;
            background: rgba(72, 187, 120, 0.1);
        }

        .login-status.error {
            color: #fc8181;
            background: rgba(252, 129, 129, 0.1);
        }

        /* Post Form */
        .post-form {
            display: none;
        }

        .post-form.visible {
            display: block;
        }

        .post-form input,
        .post-form textarea {
            width: 100%;
            padding: 0.9rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
        }

        .post-form input:focus,
        .post-form textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .post-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        .file-upload {
            border: 2px dashed #e2e8f0;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .file-upload i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .file-upload p {
            color: #718096;
            font-weight: 500;
        }

        .file-upload .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        #fileInput {
            display: none;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .post-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .post-card .post-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-card .post-content {
            color: #4a5568;
            line-height: 1.6;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .post-card .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f0f0f0;
            font-size: 0.85rem;
            color: #718096;
        }

        .post-card .post-meta i {
            margin-right: 0.3rem;
        }

        .post-card .post-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .post-card .post-actions button {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-edit {
            background: #ebf4ff;
            color: #667eea;
        }

        .btn-edit:hover {
            background: #667eea;
            color: white;
        }

        .btn-delete {
            background: #fff5f5;
            color: #fc8181;
        }

        .btn-delete:hover {
            background: #fc8181;
            color: white;
        }

        .post-card .file-attachment {
            background: #f7fafc;
            border-radius: 12px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .post-card .file-attachment i {
            font-size: 1.5rem;
            color: #667eea;
        }

        .post-card .file-attachment a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }

        .post-card .file-attachment a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #718096;
        }

        .empty-state i {
            font-size: 4rem;
            color: #cbd5e0;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 30px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            padding: 0.9rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .modal textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header {
                padding: 1rem 1.5rem;
                flex-direction: column;
                align-items: stretch;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .header-actions {
                flex-wrap: wrap;
            }
            .card {
                padding: 1.5rem;
            }
            .posts-grid {
                grid-template-columns: 1fr;
            }
            .login-form {
                flex-direction: column;
            }
            .login-form input {
                min-width: auto;
                width: 100%;
            }
            .modal {
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-feather-alt"></i> My Blog</h1>
            <div class="header-actions">
                <button id="authToggleBtn" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Admin Login
                </button>
            </div>
        </header>

        <!-- Login Card -->
        <div class="card" id="loginCard">
            <div class="card-title"><i class="fas fa-shield-alt"></i> Admin Access</div>
            <div class="login-form">
                <input type="email" id="loginEmail" placeholder="Email" value="admin@blog.com" />
                <input type="password" id="loginPassword" placeholder="Password" value="12345678" />
                <button id="loginBtn" class="btn btn-primary"><i class="fas fa-arrow-right"></i> Login</button>
                <button id="logoutBtn" class="btn btn-danger hidden"><i class="fas fa-sign-out-alt"></i> Logout</button>
                <div id="loginStatus" class="login-status">🔐 Use demo credentials or sign up</div>
            </div>
        </div>

        <!-- Create Post Card -->
        <div class="card" id="postCard">
            <div class="card-title"><i class="fas fa-pencil-alt"></i> Create New Post</div>
            <div id="postFormWrapper" class="post-form">
                <input type="text" id="postTitle" placeholder="Post Title" />
                <textarea id="postContent" placeholder="Write your amazing content here..."></textarea>
                
                <div class="file-upload" id="fileUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload file (PDF, Image, Document)</p>
                    <div class="file-name" id="fileName">No file selected</div>
                    <input type="file" id="fileInput" />
                </div>

                <div class="form-actions">
                    <button id="publishBtn" class="btn btn-success"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
                    <button id="cancelEditBtn" class="btn btn-outline hidden"><i class="fas fa-times"></i> Cancel</button>
                </div>
                <div id="publishStatus" style="margin-top: 1rem; font-weight: 500;"></div>
            </div>
            <div id="loginRequiredMsg" style="color: #718096;">
                <i class="fas fa-info-circle"></i> Log in to create posts.
            </div>
        </div>

        <!-- Posts Card -->
        <div class="card">
            <div class="card-title"><i class="fas fa-newspaper"></i> All Posts</div>
            <div id="postsContainer" class="posts-grid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Loading posts...</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2><i class="fas fa-edit"></i> Edit Post</h2>
            <input type="text" id="editTitle" placeholder="Title" />
            <textarea id="editContent" placeholder="Content"></textarea>
            <div class="file-upload" id="editFileUploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Update file (optional)</p>
                <div class="file-name" id="editFileName">No file selected</div>
                <input type="file" id="editFileInput" />
            </div>
            <div class="modal-actions">
                <button id="closeModalBtn" class="btn btn-outline"><i class="fas fa-times"></i> Cancel</button>
                <button id="saveEditBtn" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Supabase Config
            const SUPABASE_URL = 'https://yrvetxtjvkdvknnvngez.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // DOM Elements
            const authToggleBtn = document.getElementById('authToggleBtn');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const loginStatus = document.getElementById('loginStatus');

            const postFormWrapper = document.getElementById('postFormWrapper');
            const loginRequiredMsg = document.getElementById('loginRequiredMsg');
            const postTitle = document.getElementById('postTitle');
            const postContent = document.getElementById('postContent');
            const publishBtn = document.getElementById('publishBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const publishStatus = document.getElementById('publishStatus');

            const fileInput = document.getElementById('fileInput');
            const fileName = document.getElementById('fileName');
            const fileUploadArea = document.getElementById('fileUploadArea');

            const postsContainer = document.getElementById('postsContainer');

            const editModal = document.getElementById('editModal');
            const editTitle = document.getElementById('editTitle');
            const editContent = document.getElementById('editContent');
            const editFileInput = document.getElementById('editFileInput');
            const editFileName = document.getElementById('editFileName');
            const saveEditBtn = document.getElementById('saveEditBtn');
            const closeModalBtn = document.getElementById('closeModalBtn');

            // State
            let currentUser = null;
            let editingPostId = null;
            let editingFileUrl = null;
            let currentFileUrl = null;

            // File upload handlers
            fileUploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    fileName.textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                } else {
                    fileName.textContent = 'No file selected';
                }
            });

            editFileUploadArea.addEventListener('click', () => editFileInput.click());
            editFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    editFileName.textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                } else {
                    editFileName.textContent = 'No file selected';
                }
            });

            // Upload file to Supabase Storage
            async function uploadFile(file, folder = 'posts') {
                if (!file) return null;
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const filePath = `${folder}/${fileName}`;

                const { data, error } = await supabase.storage
                    .from('blog-files')
                    .upload(filePath, file);

                if (error) throw error;

                const { data: urlData } = supabase.storage
                    .from('blog-files')
                    .getPublicUrl(filePath);

                return urlData.publicUrl;
            }

            // Fetch posts
            async function fetchPosts() {
                try {
                    const { data, error } = await supabase
                        .from('posts')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    renderPosts(data || []);
                } catch (err) {
                    console.error('Fetch error:', err);
                    postsContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle" style="color: #fc8181;"></i>
                            <h3>Error loading posts</h3>
                            <p>${err.message}</p>
                        </div>
                    `;
                }
            }

            // Render posts
            function renderPosts(posts) {
                if (!posts || posts.length === 0) {
                    postsContainer.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-feather-alt"></i>
                            <h3>No posts yet</h3>
                            <p>Be the first to create a blog post!</p>
                        </div>
                    `;
                    return;
                }

                postsContainer.innerHTML = posts.map(post => {
                    const date = post.created_at ? new Date(post.created_at).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    }) : 'Unknown date';

                    let fileHtml = '';
                    if (post.file_url) {
                        const isImage = post.file_url.match(/\.(jpg|jpeg|png|gif|webp)$/i);
                        if (isImage) {
                            fileHtml = `
                                <div class="file-attachment">
                                    <i class="fas fa-image"></i>
                                    <a href="${post.file_url}" target="_blank">View Image</a>
                                </div>
                            `;
                        } else {
                            fileHtml = `
                                <div class="file-attachment">
                                    <i class="fas fa-paperclip"></i>
                                    <a href="${post.file_url}" target="_blank">Download File</a>
                                </div>
                            `;
                        }
                    }

                    return `
                        <div class="post-card" data-id="${post.id}">
                            <div class="post-title">${escapeHtml(post.title)}</div>
                            <div class="post-content">${escapeHtml(post.content)}</div>
                            ${fileHtml}
                            <div class="post-meta">
                                <span><i class="far fa-calendar-alt"></i> ${date}</span>
                                <span><i class="far fa-user"></i> ${escapeHtml(post.author_email)}</span>
                            </div>
                            ${currentUser ? `
                                <div class="post-actions">
                                    <button class="btn-edit" onclick="window.editPost('${post.id}')">
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                    <button class="btn-delete" onclick="window.deletePost('${post.id}')">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }

            // Escape HTML
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Login
            async function handleLogin() {
                const email = loginEmail.value.trim();
                const password = loginPassword.value.trim();

                if (!email || !password) {
                    loginStatus.className = 'login-status error';
                    loginStatus.textContent = '❌ Email and password required';
                    return;
                }

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password
                    });

                    if (error) throw error;
                    if (data?.user) {
                        currentUser = data.user;
                        updateUIForUser(currentUser);
                        loginStatus.className = 'login-status success';
                        loginStatus.textContent = `✅ Welcome, ${currentUser.email}!`;
                    }
                } catch (err) {
                    loginStatus.className = 'login-status error';
                    loginStatus.textContent = `❌ ${err.message}`;
                }
            }

            // Logout
            async function handleLogout() {
                try {
                    await supabase.auth.signOut();
                    currentUser = null;
                    updateUIForUser(null);
                    loginStatus.className = 'login-status';
                    loginStatus.textContent = '🔐 Logged out successfully';
                } catch (err) {
                    loginStatus.className = 'login-status error';
                    loginStatus.textContent = `❌ ${err.message}`;
                }
            }

            // Update UI based on user
            function updateUIForUser(user) {
                if (user) {
                    authToggleBtn.innerHTML = `<i class="fas fa-user-circle"></i> ${user.email}`;
                    authToggleBtn.className = 'btn btn-primary';
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    postFormWrapper.classList.add('visible');
                    loginRequiredMsg.style.display = 'none';
                } else {
                    authToggleBtn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Admin Login`;
                    authToggleBtn.className = 'btn btn-primary';
                    loginBtn.classList.remove('hidden');
                    logoutBtn.classList.add('hidden');
                    postFormWrapper.classList.remove('visible');
                    loginRequiredMsg.style.display = 'block';
                    cancelEditBtn.classList.add('hidden');
                    editingPostId = null;
                }
                fetchPosts();
            }

            // Publish/Update post
            async function handlePublish() {
                if (!currentUser) {
                    publishStatus.textContent = '⚠️ You must be logged in';
                    return;
                }

                const title = postTitle.value.trim() || 'Untitled';
                const content = postContent.value.trim();
                if (!content) {
                    publishStatus.textContent = '⚠️ Please write some content';
                    return;
                }

                let fileUrl = currentFileUrl;
                const file = fileInput.files[0];
                if (file) {
                    try {
                        fileUrl = await uploadFile(file);
                    } catch (err) {
                        publishStatus.textContent = `❌ File upload failed: ${err.message}`;
                        return;
                    }
                }

                try {
                    if (editingPostId) {
                        // Update
                        const { error } = await supabase
                            .from('posts')
                            .update({
                                title,
                                content,
                                file_url: fileUrl,
                                updated_at: new Date()
                            })
                            .eq('id', editingPostId);

                        if (error) throw error;
                        publishStatus.textContent = '✅ Post updated!';
                        editingPostId = null;
                        cancelEditBtn.classList.add('hidden');
                        publishBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publish';
                    } else {
                        // Insert
                        const { error } = await supabase
                            .from('posts')
                            .insert([{
                                title,
                                content,
                                author_email: currentUser.email,
                                file_url: fileUrl
                            }]);

                        if (error) throw error;
                        publishStatus.textContent = '✅ Post published!';
                    }

                    postTitle.value = '';
                    postContent.value = '';
                    fileInput.value = '';
                    fileName.textContent = 'No file selected';
                    currentFileUrl = null;
                    fetchPosts();
                    setTimeout(() => publishStatus.textContent = '', 3000);
                } catch (err) {
                    publishStatus.textContent = `❌ ${err.message}`;
                }
            }

            // Edit post (global function)
            window.editPost = async function(postId) {
                if (!currentUser) return;

                try {
                    const { data, error } = await supabase
                        .from('posts')
                        .select('*')
                        .eq('id', postId)
                        .single();

                    if (error) throw error;

                    editingPostId = postId;
                    editTitle.value = data.title || '';
                    editContent.value = data.content || '';
                    editingFileUrl = data.file_url || null;
                    editFileName.textContent = editingFileUrl ? '📎 Current file attached' : 'No file selected';
                    editFileInput.value = '';

                    editModal.classList.add('active');
                } catch (err) {
                    alert('Error loading post: ' + err.message);
                }
            };

            // Save edit
            async function handleSaveEdit() {
                if (!editingPostId) return;

                const title = editTitle.value.trim() || 'Untitled';
                const content = editContent.value.trim();
                if (!content) {
                    alert('Please write some content');
                    return;
                }

                let fileUrl = editingFileUrl;
                const file = editFileInput.files[0];
                if (file) {
                    try {
                        fileUrl = await uploadFile(file);
                    } catch (err) {
                        alert('File upload failed: ' + err.message);
                        return;
                    }
                }

                try {
                    const { error } = await supabase
                        .from('posts')
                        .update({
                            title,
                            content,
                            file_url: fileUrl,
                            updated_at: new Date()
                        })
                        .eq('id', editingPostId);

                    if (error) throw error;

                    editModal.classList.remove('active');
                    editingPostId = null;
                    fetchPosts();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            }

            // Delete post (global function)
            window.deletePost = async function(postId) {
                if (!currentUser) return;
                if (!confirm('Are you sure you want to delete this post?')) return;

                try {
                    const { error } = await supabase
                        .from('posts')
                        .delete()
                        .eq('id', postId);

                    if (error) throw error;
                    fetchPosts();
                } catch (err) {
                    alert('Delete failed: ' + err.message);
                }
            };

            // Cancel edit
            function cancelEdit() {
                editingPostId = null;
                cancelEditBtn.classList.add('hidden');
                publishBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publish';
                postTitle.value = '';
                postContent.value = '';
                fileInput.value = '';
                fileName.textContent = 'No file selected';
                currentFileUrl = null;
                publishStatus.textContent = '';
            }

            // Check session
            async function checkSession() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session?.user) {
                        currentUser = session.user;
                        updateUIForUser(currentUser);
                        loginStatus.className = 'login-status success';
                        loginStatus.textContent = `✅ Logged in as ${currentUser.email}`;
                    } else {
                        updateUIForUser(null);
                    }
                } catch (err) {
                    updateUIForUser(null);
                }
                fetchPosts();
            }

            // Event Listeners
            loginBtn.addEventListener('click', handleLogin);
            logoutBtn.addEventListener('click', handleLogout);
            publishBtn.addEventListener('click', handlePublish);
            cancelEditBtn.addEventListener('click', cancelEdit);
            saveEditBtn.addEventListener('click', handleSaveEdit);
            closeModalBtn.addEventListener('click', () => editModal.classList.remove('active'));

            // Close modal on overlay click
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) editModal.classList.remove('active');
            });

            // Enter key for login
            loginPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            authToggleBtn.addEventListener('click', () => {
                if (currentUser) {
                    if (confirm('Logout?')) handleLogout();
                } else {
                    document.getElementById('loginCard').scrollIntoView({ behavior: 'smooth' });
                }
            });
