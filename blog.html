<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lokendra · Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --brand: #2563eb;
      --brand-hover: #1d4ed8;
      --brand-light: rgba(37, 99, 235, 0.08);
      --accent: #f59e0b;
      --shadow: 0 8px 30px rgba(0,0,0,0.04);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 12px;
      --transition: 0.25s cubic-bezier(0.2,0,0,1);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --border: #334155;
      --brand-light: rgba(37,99,235,0.2);
      --shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.25s, color 0.25s;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      background: rgba(var(--surface-rgb,255,255,255),0.8);
      transition: background 0.25s;
    }
    [data-theme="dark"] .navbar { background: rgba(30,41,59,0.85); }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--brand); display: flex; align-items: center; gap: 8px; }
    .nav-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 40px;
      background: var(--border);
      color: var(--text);
      text-decoration: none;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-hover); transform: scale(1.02); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); }
    .btn-outline:hover { background: var(--brand-light); border-color: var(--brand); }
    .btn-accent { background: var(--accent); color: #0f172a; }
    .btn-accent:hover { background: #d97706; }
    
    .blog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: all 0.25s;
    }
    .blog-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .blog-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 14px; background: var(--border); }
    .category-badge { background: var(--brand-light); color: var(--brand); padding: 2px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .post-meta { font-size: 0.85rem; color: #94a3b8; margin: 6px 0 10px; display: flex; gap: 12px; flex-wrap: wrap; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .mb-4 { margin-bottom: 16px; }
    .text-center { text-align: center; }
    .text-gray { color: #94a3b8; }
    
    .skeleton { background: var(--border); border-radius: 8px; height: 120px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
    
    .footer { border-top: 1px solid var(--border); padding: 24px 0; margin-top: 40px; text-align: center; font-size: 0.85rem; color: #94a3b8; }
    
    .hero {
      padding: 60px 0 40px;
      text-align: center;
    }
    .hero h1 { font-size: 2.8rem; margin-bottom: 12px; }
    .hero p { font-size: 1.2rem; opacity: 0.8; max-width: 600px; margin: 0 auto 24px; }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo"><i class="fas fa-feather-alt"></i> Lokendra.dev</div>
    <div class="nav-actions">
      <button class="btn btn-outline" id="themeToggle"><i class="fas fa-moon"></i></button>
      <button class="btn btn-primary" id="goToDashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
      <button class="btn btn-outline" id="authBtn"><i class="fas fa-lock"></i> Login</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Write. Share. Inspire.</h1>
      <p>Personal blog by Nabin Chalise — thoughts on tech, design, and the art of living.</p>
    </div>
  </section>

  <!-- BLOG -->
  <main class="container" id="blogSection">
    <h2 class="mb-4">📝 Latest Posts</h2>
    <div id="blogContainer"><div class="skeleton"></div><div class="skeleton"></div></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer container">
    <p>&copy; 2026 Nabin Chalise · Built with <i class="fas fa-heart" style="color:var(--accent);"></i> and Supabase</p>
  </footer>

  <script>
    // Supabase Config
    const SUPABASE_URL = 'https://yrvetxtjvkdvknnvngez.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let posts = [];

    const blogContainer = document.getElementById('blogContainer');
    const authBtn = document.getElementById('authBtn');
    const goToDashboard = document.getElementById('goToDashboard');

    // Theme
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const icon = document.querySelector('#themeToggle i');
      if (icon) icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Auth
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        currentUser = session.user;
        updateUI();
      }
    }

    function updateUI() {
      if (currentUser) {
        authBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> Logout`;
        authBtn.onclick = handleLogout;
      } else {
        authBtn.innerHTML = `<i class="fas fa-lock"></i> Login`;
        authBtn.onclick = () => window.location.href = 'dashboard.html';
      }
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      updateUI();
      fetchPosts();
    }

    // Go to Dashboard
    goToDashboard.addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    // Fetch Posts
    async function fetchPosts() {
      blogContainer.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
      try {
        const { data, error } = await supabase
          .from('blog_posts')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        posts = data || [];
        renderPosts();
      } catch (err) {
        blogContainer.innerHTML = `<p class="text-center text-gray">❌ ${err.message}</p>`;
      }
    }

    function renderPosts() {
      if (!posts.length) {
        blogContainer.innerHTML = `<p class="text-center text-gray">📭 No posts yet.</p>`;
        return;
      }
      blogContainer.innerHTML = posts.map(post => `
        <div class="blog-card">
          ${post.image_url ? `<img src="${post.image_url}" alt="${post.title}" loading="lazy" />` : ''}
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <h3>${escapeHtml(post.title)}</h3>
            <span class="category-badge">${escapeHtml(post.category || 'General')}</span>
          </div>
          <div class="post-meta">
            <span>✍️ ${escapeHtml(post.author || 'Anonymous')}</span>
            <span>📅 ${new Date(post.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}</span>
          </div>
          <p style="margin:8px 0;">${escapeHtml(post.content)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    checkAuth();
    fetchPosts();
  </script>
</body>
</html>
