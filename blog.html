<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog | Nabin Chalise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --brand: #3b82f6;
            --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }
        .blog-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .btn {
            padding: 10px 24px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 12px;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .post-meta {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 8px;
        }
        .category-badge {
            background: rgba(59,130,246,0.1);
            color: #3b82f6;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .auth-status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
        }
        .auth-status.error { background: #fef2f2; color: #dc2626; display: block; }
        .auth-status.success { background: #f0fdf4; color: #16a34a; display: block; }
    </style>
</head>
<body>

    <!-- ====== NAVBAR ====== -->
    <nav class="navbar">
        <h1 class="text-2xl font-bold text-blue-600">📝 My Personal Blog</h1>
        <div class="flex gap-2">
            <button onclick="showCreateModal()" class="btn btn-primary" id="createBtn" style="display:none;">
                ➕ New Post
            </button>
            <button onclick="toggleTheme()" class="btn" style="background:var(--border); color:var(--text);">
                🌓 Theme
            </button>
            <button onclick="handleAuth()" class="btn" id="authBtn" style="background:var(--border); color:var(--text);">
                🔐 Login
            </button>
        </div>
    </nav>

    <!-- ====== BLOG POSTS CONTAINER ====== -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div id="blogContainer">
            <p class="text-center text-gray-500">Loading posts...</p>
        </div>
    </div>

    <!-- ====== CREATE/EDIT MODAL ====== -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4" id="modalTitle">Create New Post</h2>
            <form id="postForm" onsubmit="handlePostSubmit(event)">
                <input type="hidden" id="postId" value="">
                <input type="text" id="postTitle" class="form-control" placeholder="Post Title" required />
                <input type="text" id="postCategory" class="form-control" placeholder="Category (e.g., Technology, Personal)" />
                <textarea id="postContent" class="form-control" rows="6" placeholder="Write your blog content here..." required></textarea>
                <input type="url" id="postImage" class="form-control" placeholder="Image URL (optional)" />
                <div class="flex gap-2">
                    <button type="submit" class="btn btn-success" id="saveBtn">Save Post</button>
                    <button type="button" onclick="closeModal()" class="btn" style="background:var(--border); color:var(--text);">Cancel</button>
                </div>
                <div id="postStatus" class="auth-status"></div>
            </form>
        </div>
    </div>

    <!-- ====== LOGIN MODAL ====== -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4">🔐 Admin Login</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" class="form-control" placeholder="Email" required />
                <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <button type="button" onclick="closeLoginModal()" class="btn" style="background:var(--border); color:var(--text);">Cancel</button>
                </div>
                <div id="loginStatus" class="auth-status"></div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔐 SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // ============================================================
        // 📚 BLOG CRUD OPERATIONS
        // ============================================================

        // --- READ: Fetch all blog posts ---
        async function fetchPosts() {
            const container = document.getElementById('blogContainer');
            container.innerHTML = '<p class="text-center text-gray-500">Loading posts...</p>';

            try {
                const { data, error } = await supabase
                    .from('blog_posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <p class="text-gray-500 text-lg">📭 No blog posts yet.</p>
                            <p class="text-gray-400 text-sm">Login to create your first post!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.map(post => `
                    <div class="blog-card">
                        ${post.image_url ? `<img src="${post.image_url}" alt="${post.title}" class="w-full h-48 object-cover rounded-lg mb-4" />` : ''}
                        <div class="flex justify-between items-start">
                            <h2 class="text-2xl font-bold">${escapeHtml(post.title)}</h2>
                            <span class="category-badge">${escapeHtml(post.category || 'General')}</span>
                        </div>
                        <div class="post-meta">
                            ${post.author ? `✍️ ${escapeHtml(post.author)}` : ''}
                            • 📅 ${new Date(post.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
                            ${post.updated_at ? `• Updated: ${new Date(post.updated_at).toLocaleDateString()}` : ''}
                        </div>
                        <div class="mt-3 text-gray-600 dark:text-gray-300">
                            ${escapeHtml(post.content)}
                        </div>
                        ${currentUser ? `
                            <div class="mt-4 flex gap-2">
                                <button onclick="editPost('${post.id}')" class="btn btn-primary text-sm">✏️ Edit</button>
                                <button onclick="deletePost('${post.id}')" class="btn btn-danger text-sm">🗑️ Delete</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');

            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = `<p class="text-red-500 text-center">❌ Failed to load posts: ${error.message}</p>`;
            }
        }

        // --- CREATE: New post ---
        async function createPost(title, content, category, image_url) {
            try {
                const { data, error } = await supabase
                    .from('blog_posts')
                    .insert([{
                        title: title,
                        content: content,
                        category: category || 'General',
                        image_url: image_url || null,
                        author: currentUser?.email || 'Anonymous'
                    }])
                    .select();

                if (error) throw error;
                return data;
            } catch (error) {
                throw error;
            }
        }

        // --- UPDATE: Edit post ---
        async function updatePost(id, title, content, category, image_url) {
            try {
                const { data, error } = await supabase
                    .from('blog_posts')
                    .update({
                        title: title,
                        content: content,
                        category: category || 'General',
                        image_url: image_url || null,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', id)
                    .select();

                if (error) throw error;
                return data;
            } catch (error) {
                throw error;
            }
        }

        // --- DELETE: Remove post ---
        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;

            try {
                const { error } = await supabase
                    .from('blog_posts')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showStatus('✅ Post deleted successfully!', 'success');
                fetchPosts();
            } catch (error) {
                console.error('Delete error:', error);
                showStatus('❌ Delete failed: ' + error.message, 'error');
            }
        }

        // ============================================================
        // 🖥️ UI HELPERS
        // ============================================================

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showStatus(message, type) {
            const status = document.getElementById('postStatus');
            status.textContent = message;
            status.className = 'auth-status ' + type;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        function showLoginStatus(message, type) {
            const status = document.getElementById('loginStatus');
            status.textContent = message;
            status.className = 'auth-status ' + type;
            status.style.display = 'block';
        }

        // ============================================================
        // 📝 MODAL HANDLERS
        // ============================================================

        function showCreateModal() {
            if (!currentUser) {
                alert('🔐 Please login first!');
                openLoginModal();
                return;
            }
            document.getElementById('modalTitle').textContent = 'Create New Post';
            document.getElementById('postId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postCategory').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
            document.getElementById('postStatus').style.display = 'none';
            document.getElementById('postModal').classList.add('active');
        }

        async function editPost(id) {
            if (!currentUser) {
                alert('🔐 Please login first!');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('blog_posts')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) throw error;

                document.getElementById('modalTitle').textContent = 'Edit Post';
                document.getElementById('postId').value = data.id;
                document.getElementById('postTitle').value = data.title;
                document.getElementById('postCategory').value = data.category || '';
                document.getElementById('postContent').value = data.content;
                document.getElementById('postImage').value = data.image_url || '';
                document.getElementById('postStatus').style.display = 'none';
                document.getElementById('postModal').classList.add('active');
            } catch (error) {
                alert('❌ Failed to load post: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('loginStatus').style.display = 'none';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        // ============================================================
        // 🔐 AUTH HANDLERS
        // ============================================================

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            showLoginStatus('⏳ Authenticating...', 'success');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;
                showLoginStatus('✅ Login successful!', 'success');
                updateUIForUser(currentUser);
                closeLoginModal();
                fetchPosts();
            } catch (error) {
                console.error('Login error:', error);
                showLoginStatus('❌ ' + (error.message || 'Login failed'), 'error');
            }
        }

        async function handleLogout() {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                currentUser = null;
                updateUIForUser(null);
                fetchPosts();
            } catch (error) {
                alert('❌ Logout failed: ' + error.message);
            }
        }

        function handleAuth() {
            if (currentUser) {
                handleLogout();
            } else {
                openLoginModal();
            }
        }

        function updateUIForUser(user) {
            const authBtn = document.getElementById('authBtn');
            const createBtn = document.getElementById('createBtn');
            
            if (user) {
                authBtn.textContent = `👤 ${user.email.split('@')[0]} (Logout)`;
                createBtn.style.display = 'inline-block';
            } else {
                authBtn.textContent = '🔐 Login';
                createBtn.style.display = 'none';
            }
        }

        // ============================================================
        // 📤 POST FORM SUBMIT
        // ============================================================

        async function handlePostSubmit(event) {
            event.preventDefault();
            
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const category = document.getElementById('postCategory').value.trim();
            const image_url = document.getElementById('postImage').value.trim();

            if (!title || !content) {
                showStatus('⚠️ Title and content are required!', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                if (id) {
                    // Update
                    await updatePost(id, title, content, category, image_url);
                    showStatus('✅ Post updated successfully!', 'success');
                } else {
                    // Create
                    await createPost(title, content, category, image_url);
                    showStatus('✅ Post created successfully!', 'success');
                }
                
                closeModal();
                fetchPosts();
            } catch (error) {
                console.error('Save error:', error);
                showStatus('❌ Failed to save post: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Post';
            }
        }

        // ============================================================
        // 🌓 THEME TOGGLE
        // ============================================================

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // ============================================================
        // 🚀 CHECK AUTH STATUS ON LOAD
        // ============================================================

        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    currentUser = session.user;
                    updateUIForUser(currentUser);
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            await fetchPosts();
        });

        // ============================================================
        // 📌 MAKE FUNCTIONS GLOBAL
        // ============================================================

        window.showCreateModal = showCreateModal;
        window.editPost = editPost;
        window.deletePost = deletePost;
        window.handlePostSubmit = handlePostSubmit;
        window.handleLogin = handleLogin;
        window.handleAuth = handleAuth;
        window.handleLogout = handleLogout;
        window.closeModal = closeModal;
        window.openLoginModal = openLoginModal;
        window.closeLoginModal = closeLoginModal;
        window.toggleTheme = toggleTheme;

    </script>
</body>
</html>
